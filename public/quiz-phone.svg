<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 410">
  <!-- Phone shell -->
  <rect x="2" y="2" width="196" height="406" rx="28" fill="#1a1714"/>
  <!-- Screen dark -->
  <rect x="10" y="10" width="180" height="390" rx="20" fill="#1e1b4b"/>
  <!-- Dynamic island -->
  <rect x="72" y="15" width="56" height="13" rx="6.5" fill="#1a1714"/>
  <!-- Status bar -->
  <text x="100" y="38" font-family="sans-serif" font-size="8" fill="#818cf8" text-anchor="middle" font-weight="600">9:41</text>

  <!-- Header -->
  <text x="100" y="62" font-family="sans-serif" font-size="13" font-weight="700" fill="#e0e7ff" text-anchor="middle">Quiz Android</text>

  <!-- Progress bar background -->
  <rect x="20" y="70" width="160" height="5" rx="2.5" fill="#312e81"/>
  <!-- Progress fill -->
  <rect x="20" y="70" width="96" height="5" rx="2.5" fill="#818cf8"/>
  <!-- Progress text -->
  <text x="100" y="87" font-family="sans-serif" font-size="7.5" fill="#818cf8" text-anchor="middle">Pergunta 6 de 10</text>

  <!-- Question card -->
  <rect x="16" y="96" width="168" height="78" rx="10" fill="#312e81"/>
  <text x="100" y="122" font-family="sans-serif" font-size="7" fill="#818cf8" text-anchor="middle" letter-spacing="1">PERGUNTA</text>
  <text x="100" y="140" font-family="sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">Qual linguagem é usada</text>
  <text x="100" y="155" font-family="sans-serif" font-size="10" fill="#c7d2fe" text-anchor="middle">no Android moderno?</text>
  <text x="100" y="167" font-family="sans-serif" font-size="7.5" fill="#6366f1" text-anchor="middle">Seleciona a resposta correta</text>

  <!-- Option A - wrong (greyed) -->
  <rect x="16" y="183" width="168" height="40" rx="8" fill="#312e81"/>
  <text x="36" y="208" font-family="sans-serif" font-size="9" fill="#6366f1" font-weight="600">A</text>
  <text x="100" y="208" font-family="sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">Java</text>

  <!-- Option B - correct (highlighted green) -->
  <rect x="16" y="229" width="168" height="40" rx="8" fill="#065f46"/>
  <rect x="16" y="229" width="168" height="40" rx="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="36" y="254" font-family="sans-serif" font-size="9" fill="#34d399" font-weight="600">B</text>
  <text x="100" y="254" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="700">Kotlin ✓</text>

  <!-- Option C -->
  <rect x="16" y="275" width="168" height="40" rx="8" fill="#312e81"/>
  <text x="36" y="300" font-family="sans-serif" font-size="9" fill="#6366f1" font-weight="600">C</text>
  <text x="100" y="300" font-family="sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">Swift</text>

  <!-- Option D -->
  <rect x="16" y="321" width="168" height="40" rx="8" fill="#312e81"/>
  <text x="36" y="346" font-family="sans-serif" font-size="9" fill="#6366f1" font-weight="600">D</text>
  <text x="100" y="346" font-family="sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">Python</text>

  <!-- Score -->
  <text x="100" y="376" font-family="sans-serif" font-size="7.5" fill="#818cf8" text-anchor="middle">⭐ Pontuação: 600 pts</text>

  <!-- Bottom home bar -->
  <rect x="76" y="384" width="48" height="4" rx="2" fill="#818cf8" opacity="0.3"/>
</svg>
