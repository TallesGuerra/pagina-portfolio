<svg viewBox="0 0 280 500" xmlns="http://www.w3.org/2000/svg">
  <!-- App screen background (light purple, no phone shell) -->
  <rect width="280" height="500" rx="16" fill="#eeeaf8"/>

  <!-- Status bar -->
  <text x="18" y="24" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0f0c29">9:41</text>

  <!-- Header -->
  <text x="18" y="58" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0f0c29">Finanças no Bolso</text>
  <text x="262" y="58" font-family="sans-serif" font-size="11" fill="#3b3bd4" text-anchor="end">Ver tudo →</text>

  <!-- Balance card -->
  <rect x="18" y="68" width="244" height="132" rx="20" fill="#2e2ea8"/>

  <!-- Saldo label -->
  <text x="34" y="94" font-family="sans-serif" font-size="12" fill="#b8b8f0">Saldo atual</text>

  <!-- Balance amount -->
  <text x="34" y="124" font-family="sans-serif" font-size="30" font-weight="bold" fill="#ffffff">3 800,00 €</text>

  <!-- Divider -->
  <line x1="34" y1="142" x2="246" y2="142" stroke="#4a4ac0" stroke-width="1"/>

  <!-- Receitas -->
  <text x="34" y="162" font-family="sans-serif" font-size="11" fill="#86efac">▲ Receitas</text>
  <text x="34" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4ade80">5 000,00 €</text>

  <!-- Despesas -->
  <text x="158" y="162" font-family="sans-serif" font-size="11" fill="#fca5a5">▼ Despesas</text>
  <text x="158" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f87171">1 200,00 €</text>

  <!-- Transactions header -->
  <text x="18" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f0c29">Transações recentes</text>

  <!-- Transaction 1 - Salario -->
  <rect x="18" y="230" width="244" height="58" rx="14" fill="#ddd9f0"/>
  <circle cx="50" cy="259" r="15" fill="#bbf7d0"/>
  <text x="50" y="264" font-family="sans-serif" font-size="16" fill="#166534" text-anchor="middle">↑</text>
  <text x="74" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Salário</text>
  <text x="74" y="269" font-family="sans-serif" font-size="11" fill="#6b7280">Trabalho · Hoje</text>
  <text x="254" y="260" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="end">+5 000,00 €</text>

  <!-- Transaction 2 - Aluguel -->
  <rect x="18" y="298" width="244" height="58" rx="14" fill="#ddd9f0"/>
  <circle cx="50" cy="327" r="15" fill="#fee2e2"/>
  <text x="50" y="332" font-family="sans-serif" font-size="16" fill="#991b1b" text-anchor="middle">↓</text>
  <text x="74" y="320" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Aluguel</text>
  <text x="74" y="337" font-family="sans-serif" font-size="11" fill="#6b7280">Moradia · Ontem</text>
  <text x="254" y="328" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="end">-1 200,00 €</text>

  <!-- Transaction 3 - Supermercado -->
  <rect x="18" y="366" width="244" height="58" rx="14" fill="#ddd9f0"/>
  <circle cx="50" cy="395" r="15" fill="#fee2e2"/>
  <text x="50" y="400" font-family="sans-serif" font-size="16" fill="#991b1b" text-anchor="middle">↓</text>
  <text x="74" y="388" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Supermercado</text>
  <text x="74" y="405" font-family="sans-serif" font-size="11" fill="#6b7280">Alimentação · Seg</text>
  <text x="254" y="396" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="end">-180,00 €</text>

  <!-- FAB button -->
  <circle cx="240" cy="462" r="26" fill="#2e2ea8"/>
  <text x="240" y="470" font-family="sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">+</text>

  <!-- Home bar -->
  <rect x="100" y="488" width="80" height="4" rx="2" fill="#9994c0"/>
</svg>
