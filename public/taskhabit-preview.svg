<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 410">
  <defs>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#16131F"/>
    </linearGradient>
    <linearGradient id="progressFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BB86FC"/>
      <stop offset="100%" stop-color="#9C5FD6"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="10" y="10" width="180" height="390" rx="20"/>
    </clipPath>
  </defs>

  <!-- Phone shell -->
  <rect x="2" y="2" width="196" height="406" rx="28" fill="#111118"/>
  <!-- Screen background -->
  <rect x="10" y="10" width="180" height="390" rx="20" fill="#121218"/>
  <!-- Dynamic island -->
  <rect x="74" y="15" width="52" height="12" rx="6" fill="#111118"/>

  <!-- All screen content clipped to screen bounds -->
  <g clip-path="url(#screenClip)">

    <!-- Status bar -->
    <text x="22" y="35" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.85)" font-weight="500">9:41</text>
    <text x="178" y="35" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.6)" text-anchor="end">▲ ▮</text>

    <!-- Greeting area -->
    <text x="20" y="55" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" letter-spacing="0.3">Quinta, 23 Abr</text>
    <text x="20" y="70" font-family="sans-serif" font-size="12.5" font-weight="700" fill="white">Bom dia, Talles</text>

    <!-- Progress bar background -->
    <rect x="20" y="78" width="160" height="16" rx="8" fill="#2A2535"/>
    <!-- Progress fill (3/5 = 60%) -->
    <rect x="20" y="78" width="96" height="16" rx="8" fill="url(#progressFill)"/>
    <text x="100" y="89.5" font-family="sans-serif" font-size="6.5" fill="white" text-anchor="middle" font-weight="600">3 de 5 concluídos</text>

    <!-- Section label -->
    <text x="20" y="107" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" font-weight="600" letter-spacing="1">HOJE</text>

    <!-- ── Habit card 1 — done ── green -->
    <rect x="16" y="113" width="168" height="37" rx="9" fill="#1E1B2E"/>
    <rect x="16" y="113" width="4" height="37" rx="2" fill="#81C784"/>
    <!-- check circle -->
    <circle cx="170" cy="131.5" r="8.5" fill="#81C784"/>
    <text x="170" y="135.5" font-family="sans-serif" font-size="9" fill="#121218" text-anchor="middle" font-weight="700">✓</text>
    <text x="28" y="127" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.38)" text-decoration="line-through">Meditar 10 min</text>
    <text x="28" y="141" font-family="sans-serif" font-size="6.5" fill="#81C784">🔥 12 dias</text>

    <!-- ── Habit card 2 — done ── blue -->
    <rect x="16" y="155" width="168" height="37" rx="9" fill="#1E1B2E"/>
    <rect x="16" y="155" width="4" height="37" rx="2" fill="#64B5F6"/>
    <circle cx="170" cy="173.5" r="8.5" fill="#64B5F6"/>
    <text x="170" y="177.5" font-family="sans-serif" font-size="9" fill="#121218" text-anchor="middle" font-weight="700">✓</text>
    <text x="28" y="169" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.38)" text-decoration="line-through">Estudar Kotlin</text>
    <text x="28" y="183" font-family="sans-serif" font-size="6.5" fill="#64B5F6">🔥 7 dias</text>

    <!-- ── Habit card 3 — done ── orange -->
    <rect x="16" y="197" width="168" height="37" rx="9" fill="#1E1B2E"/>
    <rect x="16" y="197" width="4" height="37" rx="2" fill="#FFB74D"/>
    <circle cx="170" cy="215.5" r="8.5" fill="#FFB74D"/>
    <text x="170" y="219.5" font-family="sans-serif" font-size="9" fill="#121218" text-anchor="middle" font-weight="700">✓</text>
    <text x="28" y="211" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.38)" text-decoration="line-through">Exercício 30 min</text>
    <text x="28" y="225" font-family="sans-serif" font-size="6.5" fill="#FFB74D">🔥 4 dias</text>

    <!-- ── Habit card 4 — pending ── purple -->
    <rect x="16" y="239" width="168" height="37" rx="9" fill="#1E1B2E"/>
    <rect x="16" y="239" width="4" height="37" rx="2" fill="#BB86FC"/>
    <circle cx="170" cy="257.5" r="8.5" fill="none" stroke="#BB86FC" stroke-width="1.8"/>
    <text x="28" y="253" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.88)">Leitura 20 min</text>
    <text x="28" y="267" font-family="sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)">🔥 2 dias</text>

    <!-- ── Habit card 5 — pending ── teal -->
    <rect x="16" y="281" width="168" height="37" rx="9" fill="#1E1B2E"/>
    <rect x="16" y="281" width="4" height="37" rx="2" fill="#4DD0E1"/>
    <circle cx="170" cy="299.5" r="8.5" fill="none" stroke="#4DD0E1" stroke-width="1.8"/>
    <text x="28" y="295" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.88)">Beber 2L de água</text>
    <text x="28" y="309" font-family="sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)">🔥 1 dia</text>

    <!-- ── Bottom navigation ── -->
    <rect x="10" y="330" width="180" height="70" fill="url(#navGrad)"/>
    <!-- top divider -->
    <rect x="10" y="330" width="180" height="0.75" fill="rgba(255,255,255,0.08)"/>

    <!-- Nav item: Hoje (active) -->
    <!-- home icon -->
    <rect x="26" y="338" width="18" height="16" rx="4" fill="rgba(187,134,252,0.18)"/>
    <text x="35" y="350" font-family="sans-serif" font-size="10" text-anchor="middle">🏠</text>
    <text x="35" y="362" font-family="sans-serif" font-size="5.5" fill="#BB86FC" text-anchor="middle" font-weight="700">Hoje</text>

    <!-- Nav item: Hábitos -->
    <text x="75" y="350" font-family="sans-serif" font-size="10" text-anchor="middle">📋</text>
    <text x="75" y="362" font-family="sans-serif" font-size="5.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">Hábitos</text>

    <!-- Nav item: Stats -->
    <text x="118" y="350" font-family="sans-serif" font-size="10" text-anchor="middle">📊</text>
    <text x="118" y="362" font-family="sans-serif" font-size="5.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">Stats</text>

    <!-- Nav item: Perfil -->
    <text x="161" y="350" font-family="sans-serif" font-size="10" text-anchor="middle">👤</text>
    <text x="161" y="362" font-family="sans-serif" font-size="5.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">Perfil</text>

    <!-- Home bar -->
    <rect x="76" y="393" width="48" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>

  </g>
</svg>
