<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 410">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="52%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <clipPath id="screen">
      <rect x="10" y="10" width="180" height="390" rx="20"/>
    </clipPath>
  </defs>

  <!-- Phone shell -->
  <rect x="2" y="2" width="196" height="406" rx="28" fill="#1a1714"/>
  <!-- Screen -->
  <rect x="10" y="10" width="180" height="390" rx="20" fill="url(#bgGrad)"/>
  <!-- Dynamic island -->
  <rect x="74" y="15" width="52" height="12" rx="6" fill="#1a1714"/>

  <!-- Status bar -->
  <text x="22" y="33" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.85)" font-weight="400">7:53</text>
  <text x="175" y="33" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="end">▲ ▮</text>

  <!-- Title -->
  <text x="20" y="57" font-family="sans-serif" font-size="14" font-weight="500" fill="white" letter-spacing="0.3">Lista de Tarefas</text>
  <!-- Subtitle -->
  <text x="20" y="70" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.55)" font-weight="300">4 tarefas pendentes · 1 concluída</text>

  <!-- Input field — limpo, sem label flutuante -->
  <rect x="16" y="78" width="168" height="28" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="26" y="96" font-family="sans-serif" font-size="8.5" fill="rgba(255,255,255,0.38)" font-weight="300">Nova tarefa...</text>
  <!-- Add button -->
  <rect x="142" y="82" width="34" height="20" rx="4" fill="white"/>
  <text x="159" y="95" font-family="sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle" font-weight="600">Add</text>

  <!-- Task 1 — concluída -->
  <rect x="16" y="115" width="168" height="34" rx="7" fill="rgba(255,255,255,0.75)"/>
  <rect x="26" y="124" width="14" height="14" rx="4" fill="#059669"/>
  <text x="33" y="134" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">✓</text>
  <text x="48" y="135" font-family="sans-serif" font-size="8.5" fill="#8a8a9a" font-weight="300" text-decoration="line-through">Ligar para o cliente</text>

  <!-- Task 2 -->
  <rect x="16" y="153" width="168" height="34" rx="7" fill="rgba(255,255,255,0.92)"/>
  <rect x="26" y="162" width="14" height="14" rx="4" fill="none" stroke="#c0b8d0" stroke-width="1.2"/>
  <text x="48" y="173" font-family="sans-serif" font-size="8.5" fill="#2a1a3a" font-weight="400">Iniciar novo projeto</text>
  <!-- trash icon small -->
  <text x="168" y="173" font-family="sans-serif" font-size="9" fill="#E57373" text-anchor="end">🗑</text>

  <!-- Task 3 -->
  <rect x="16" y="191" width="168" height="34" rx="7" fill="rgba(255,255,255,0.92)"/>
  <rect x="26" y="200" width="14" height="14" rx="4" fill="none" stroke="#c0b8d0" stroke-width="1.2"/>
  <text x="48" y="211" font-family="sans-serif" font-size="8.5" fill="#2a1a3a" font-weight="400">Fazer compras da semana</text>
  <text x="168" y="211" font-family="sans-serif" font-size="9" fill="#E57373" text-anchor="end">🗑</text>

  <!-- Task 4 -->
  <rect x="16" y="229" width="168" height="34" rx="7" fill="rgba(255,255,255,0.92)"/>
  <rect x="26" y="238" width="14" height="14" rx="4" fill="none" stroke="#c0b8d0" stroke-width="1.2"/>
  <text x="48" y="249" font-family="sans-serif" font-size="8.5" fill="#2a1a3a" font-weight="400">Terminar portfólio</text>
  <text x="168" y="249" font-family="sans-serif" font-size="9" fill="#E57373" text-anchor="end">🗑</text>

  <!-- Task 5 -->
  <rect x="16" y="267" width="168" height="34" rx="7" fill="rgba(255,255,255,0.92)"/>
  <rect x="26" y="276" width="14" height="14" rx="4" fill="none" stroke="#c0b8d0" stroke-width="1.2"/>
  <text x="48" y="287" font-family="sans-serif" font-size="8.5" fill="#2a1a3a" font-weight="400">Estudar Jetpack Compose</text>
  <text x="168" y="287" font-family="sans-serif" font-size="9" fill="#E57373" text-anchor="end">🗑</text>

  <!-- Mensagem motivacional -->
  <text x="100" y="330" font-family="sans-serif" font-size="18" text-anchor="middle">🎯</text>
  <text x="100" y="348" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="300">Foco no que importa hoje</text>

  <!-- Bottom home bar -->
  <rect x="76" y="382" width="48" height="3.5" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
