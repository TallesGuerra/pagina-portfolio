<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 410">
  <defs>
    <!-- Gradient roxo → teal igual à screenshot -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="55%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <!-- Clip para a tela do phone -->
    <clipPath id="screen">
      <rect x="10" y="10" width="180" height="390" rx="20"/>
    </clipPath>
  </defs>

  <!-- Phone shell -->
  <rect x="2" y="2" width="196" height="406" rx="28" fill="#1a1714"/>
  <!-- Screen com gradiente -->
  <rect x="10" y="10" width="180" height="390" rx="20" fill="url(#bgGrad)"/>

  <!-- Dynamic island -->
  <rect x="72" y="15" width="56" height="13" rx="6.5" fill="#1a1714"/>

  <!-- Status bar -->
  <text x="24" y="35" font-family="sans-serif" font-size="8" fill="white" font-weight="600">7:53</text>
  <!-- Wifi + battery icons (simplificados) -->
  <text x="160" y="35" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">▲ ▮</text>

  <!-- Title -->
  <text x="20" y="62" font-family="sans-serif" font-size="17" font-weight="700" fill="white">Lista de Tarefas</text>

  <!-- Input field -->
  <rect x="16" y="72" width="168" height="32" rx="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
  <text x="26" y="82" font-family="sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)">Nova tarefa</text>
  <text x="26" y="97" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Digite uma nova tarefa...</text>

  <!-- Add button -->
  <rect x="138" y="76" width="38" height="24" rx="5" fill="white"/>
  <text x="157" y="92" font-family="sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="700">Add</text>

  <!-- Task card 1 -->
  <rect x="16" y="115" width="168" height="40" rx="8" fill="rgba(255,255,255,0.88)"/>
  <text x="28" y="140" font-family="sans-serif" font-size="10" fill="#1a1714">Iniciar novo projeto</text>
  <!-- Trash icon -->
  <rect x="164" y="127" width="12" height="14" rx="2" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <line x1="162" y1="127" x2="178" y2="127" stroke="#E53935" stroke-width="1.5"/>
  <line x1="168" y1="124" x2="174" y2="124" stroke="#E53935" stroke-width="1.5"/>
  <line x1="168" y1="131" x2="168" y2="138" stroke="#E53935" stroke-width="1"/>
  <line x1="170" y1="131" x2="170" y2="138" stroke="#E53935" stroke-width="1"/>
  <line x1="172" y1="131" x2="172" y2="138" stroke="#E53935" stroke-width="1"/>

  <!-- Task card 2 -->
  <rect x="16" y="161" width="168" height="40" rx="8" fill="rgba(255,255,255,0.88)"/>
  <text x="28" y="186" font-family="sans-serif" font-size="10" fill="#1a1714">Fazer compras da semana</text>
  <!-- Trash icon -->
  <rect x="164" y="173" width="12" height="14" rx="2" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <line x1="162" y1="173" x2="178" y2="173" stroke="#E53935" stroke-width="1.5"/>
  <line x1="168" y1="170" x2="174" y2="170" stroke="#E53935" stroke-width="1.5"/>
  <line x1="168" y1="177" x2="168" y2="184" stroke="#E53935" stroke-width="1"/>
  <line x1="170" y1="177" x2="170" y2="184" stroke="#E53935" stroke-width="1"/>
  <line x1="172" y1="177" x2="172" y2="184" stroke="#E53935" stroke-width="1"/>

  <!-- Bottom home bar -->
  <rect x="76" y="382" width="48" height="4" rx="2" fill="white" opacity="0.35"/>
</svg>
