<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0.07"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="360" height="220" rx="8" fill="#e8e8e8"/>
  <rect width="360" height="34" rx="8" fill="#d4d4d4"/>
  <rect y="26" width="360" height="8" fill="#d4d4d4"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="17" r="5.5" fill="#ff5f57"/>
  <circle cx="34" cy="17" r="5.5" fill="#ffbd2e"/>
  <circle cx="50" cy="17" r="5.5" fill="#28c840"/>

  <!-- Address bar -->
  <rect x="66" y="8" width="228" height="18" rx="9" fill="#ffffff"/>
  <text x="180" y="20.5" font-family="sans-serif" font-size="7.5" fill="#777" text-anchor="middle">barbearia-cruz.vercel.app</text>

  <!-- Website background -->
  <rect y="34" width="360" height="186" fill="#1a1714"/>

  <!-- Navbar -->
  <rect y="34" width="360" height="30" fill="#0e0c0a"/>
  <text x="18" y="54" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#f5c518">✂ BARBEARIA CRUZ</text>
  <text x="238" y="54" font-family="sans-serif" font-size="7.5" fill="#cccccc">Início</text>
  <text x="274" y="54" font-family="sans-serif" font-size="7.5" fill="#cccccc">Serviços</text>
  <text x="316" y="54" font-family="sans-serif" font-size="7.5" fill="#f5c518">Agendar</text>

  <!-- Hero section -->
  <rect y="64" width="360" height="156" fill="url(#heroGrad)"/>

  <!-- Decorative circle -->
  <circle cx="290" cy="142" r="60" fill="rgba(245,197,24,0.05)"/>
  <circle cx="290" cy="142" r="40" fill="rgba(245,197,24,0.07)"/>

  <!-- Hero text -->
  <text x="180" y="108" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">BARBEARIA</text>
  <text x="180" y="136" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f5c518" text-anchor="middle">CRUZ</text>
  <text x="180" y="154" font-family="sans-serif" font-size="8.5" fill="#b0b0b0" text-anchor="middle">Estilo e qualidade para o homem moderno · Lisboa</text>

  <!-- CTA button -->
  <rect x="122" y="162" width="116" height="24" rx="12" fill="#f5c518"/>
  <text x="180" y="178" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#111111" text-anchor="middle">Agendar Horário →</text>

  <!-- Services strip -->
  <rect x="18" y="196" width="76" height="16" rx="4" fill="rgba(255,255,255,0.07)"/>
  <text x="56" y="207.5" font-family="sans-serif" font-size="6" fill="#cccccc" text-anchor="middle">Corte simples</text>
  <rect x="102" y="196" width="76" height="16" rx="4" fill="rgba(255,255,255,0.07)"/>
  <text x="140" y="207.5" font-family="sans-serif" font-size="6" fill="#cccccc" text-anchor="middle">Barba</text>
  <rect x="186" y="196" width="76" height="16" rx="4" fill="rgba(255,255,255,0.07)"/>
  <text x="224" y="207.5" font-family="sans-serif" font-size="6" fill="#cccccc" text-anchor="middle">Corte + Barba</text>
  <rect x="270" y="196" width="72" height="16" rx="4" fill="rgba(255,255,255,0.07)"/>
  <text x="306" y="207.5" font-family="sans-serif" font-size="6" fill="#cccccc" text-anchor="middle">Premium</text>
</svg>
